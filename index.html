<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Chicken Road</title>
<style>
  html,body{
    margin:0; padding:0; height:100%; width:100%;
    background:#0B0E1A; overflow:hidden;
    touch-action:none; -webkit-user-select:none; user-select:none;
    -webkit-tap-highlight-color:transparent;
  }
  #wrap{
    position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    background:#0B0E1A;
  }
  #game{
    image-rendering:pixelated; image-rendering:crisp-edges;
    display:block; background:#000;
    touch-action:none;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>
</div>
<script>
"use strict";
/* =====================================================================
   CHICKEN ROAD — single-file HTML5 Canvas arcade game.
   No external assets, no libraries, no network. All art drawn
   programmatically; all SFX synthesized via Web Audio API.
   ===================================================================== */

/* ---------------------------------------------------------------------
   0. Core constants (virtual/logical resolution — DESIGN.md §1.1)
   --------------------------------------------------------------------- */
const TILE   = 48;               // logical px per tile (16px art * 3x)
const COLS   = 7;                // play column width in tiles
const VW     = COLS * TILE;      // 336 virtual width
const VH     = 576;              // virtual height (12 tiles)
const HUD_H  = 48;               // top HUD strip
const WORLD_W = COLS * TILE;     // horizontal world span for entities
const ANCHOR = 415;             // screen-y where camera.y row line sits
const LEAD   = 2;                // rows player stays ahead of anchor
const HOP_DUR = 0.15;           // seconds per hop
const HOP_LIFT = 14;            // px arc apex
const STAGE_ROWS = 30;          // rows per stage before clear

/* Game states */
const S = { TITLE:'title', PLAYING:'playing', DYING:'dying', EAGLE:'eagle',
            STAGE_CLEAR:'stageclear', GAME_OVER:'gameover', VICTORY:'victory' };

/* ---------------------------------------------------------------------
   1. Bitmap font — hand-drawn 5x7 glyph table (DESIGN.md §1.6 approach 2).
   Guarantees a crisp blocky arcade look with zero external fonts.
   --------------------------------------------------------------------- */
const FONT = (function(){
  const G = {};
  const def = (c, rows) => { G[c] = rows; };
  def(' ', ["00000","00000","00000","00000","00000","00000","00000"]);
  def('0', ["01110","10001","10011","10101","11001","10001","01110"]);
  def('1', ["00100","01100","00100","00100","00100","00100","01110"]);
  def('2', ["01110","10001","00001","00010","00100","01000","11111"]);
  def('3', ["11111","00010","00100","00010","00001","10001","01110"]);
  def('4', ["00010","00110","01010","10010","11111","00010","00010"]);
  def('5', ["11111","10000","11110","00001","00001","10001","01110"]);
  def('6', ["00110","01000","10000","11110","10001","10001","01110"]);
  def('7', ["11111","00001","00010","00100","01000","01000","01000"]);
  def('8', ["01110","10001","10001","01110","10001","10001","01110"]);
  def('9', ["01110","10001","10001","01111","00001","00010","01100"]);
  def('A', ["01110","10001","10001","11111","10001","10001","10001"]);
  def('B', ["11110","10001","10001","11110","10001","10001","11110"]);
  def('C', ["01110","10001","10000","10000","10000","10001","01110"]);
  def('D', ["11100","10010","10001","10001","10001","10010","11100"]);
  def('E', ["11111","10000","10000","11110","10000","10000","11111"]);
  def('F', ["11111","10000","10000","11110","10000","10000","10000"]);
  def('G', ["01110","10001","10000","10111","10001","10001","01110"]);
  def('H', ["10001","10001","10001","11111","10001","10001","10001"]);
  def('I', ["01110","00100","00100","00100","00100","00100","01110"]);
  def('J', ["00111","00010","00010","00010","10010","10010","01100"]);
  def('K', ["10001","10010","10100","11000","10100","10010","10001"]);
  def('L', ["10000","10000","10000","10000","10000","10000","11111"]);
  def('M', ["10001","11011","10101","10101","10001","10001","10001"]);
  def('N', ["10001","11001","10101","10011","10001","10001","10001"]);
  def('O', ["01110","10001","10001","10001","10001","10001","01110"]);
  def('P', ["11110","10001","10001","11110","10000","10000","10000"]);
  def('Q', ["01110","10001","10001","10001","10101","10010","01101"]);
  def('R', ["11110","10001","10001","11110","10100","10010","10001"]);
  def('S', ["01110","10001","10000","01110","00001","10001","01110"]);
  def('T', ["11111","00100","00100","00100","00100","00100","00100"]);
  def('U', ["10001","10001","10001","10001","10001","10001","01110"]);
  def('V', ["10001","10001","10001","10001","10001","01010","00100"]);
  def('W', ["10001","10001","10001","10101","10101","11011","10001"]);
  def('X', ["10001","10001","01010","00100","01010","10001","10001"]);
  def('Y', ["10001","10001","01010","00100","00100","00100","00100"]);
  def('Z', ["11111","00001","00010","00100","01000","10000","11111"]);
  def(':', ["00000","00100","00000","00000","00100","00000","00000"]);
  def('!', ["00100","00100","00100","00100","00100","00000","00100"]);
  def("'", ["00100","00100","00000","00000","00000","00000","00000"]);
  def('/', ["00001","00010","00100","00100","00100","01000","10000"]);
  def('.', ["00000","00000","00000","00000","00000","00000","00100"]);
  def(',', ["00000","00000","00000","00000","00000","00100","01000"]);
  def('-', ["00000","00000","00000","11111","00000","00000","00000"]);
  def('?', ["01110","10001","00001","00110","00100","00000","00100"]);
  def('%', ["11001","11010","00100","01011","10011","00000","00000"]);
  return G;
})();

/* draw bitmap text.  align: 'left'|'center'|'right'. outline: 0 none,1 shadow,2 full */
function textWidth(str, sc){ return str.length * 6 * sc - sc; }
function drawText(ctx, str, x, y, sc, color, align, outline){
  str = String(str).toUpperCase();
  align = align || 'left';
  outline = (outline===undefined) ? 2 : outline;
  const w = textWidth(str, sc);
  let ox = x;
  if(align==='center') ox = Math.round(x - w/2);
  else if(align==='right') ox = Math.round(x - w);
  const drawAt = (dx, dy, col) => {
    ctx.fillStyle = col;
    let cx = ox + dx;
    for(let i=0;i<str.length;i++){
      const g = FONT[str[i]] || FONT['?'];
      for(let r=0;r<7;r++){
        const row = g[r];
        for(let c=0;c<5;c++){
          if(row[c]==='1') ctx.fillRect(cx + c*sc, (y+dy) + r*sc, sc, sc);
        }
      }
      cx += 6*sc;
    }
  };
  if(outline===2){
    const o = 'rgba(0,0,0,0.75)';
    for(let dx=-sc; dx<=sc; dx+=sc) for(let dy=-sc; dy<=sc; dy+=sc){
      if(dx||dy) drawAt(dx,dy,o);
    }
  } else if(outline===1){
    drawAt(sc, sc, 'rgba(0,0,0,0.7)');
  }
  drawAt(0,0,color);
}

/* ---------------------------------------------------------------------
   1b. Chicken sprite — 16x16 pixel map (DESIGN.md §4.1, ported from
   design/style-guide.html PIXEL_MAPS). Canonical facing = right.
   --------------------------------------------------------------------- */
const CHICKEN_PAL = { O:'#1B1611', B:'#FFF3D6', S:'#E8D5A8', C:'#E8432B',
                      K:'#FFB020', E:'#1B1611', P:'#FFFFFF', W:'#E0B876', L:'#FFB020' };
const CHICKEN_ROWS = [
  "................",
  "...........CC...",
  "..........OCCO..",
  ".........OCCCCO.",
  "........OBBBBPBO",
  "........OBBBEBKK",
  ".......OBBBBBBKK",
  ".....OBBBBBBBB..",
  "..OBWWWWWBBBBBO.",
  "..OBWWWWWBBBBBO.",
  "..OBBBBBBBBBBBO.",
  "...OBBBBBBBBBO..",
  "....OSSSSSSSO...",
  ".....OSSSSSO....",
  ".....LL..LL.....",
  ".....OO..OO....."
];
/* draws chicken in 16x16 sprite space; headDy bobs the head rows (0-6),
   wingOut adds flared wing pixels for the mid-hop flap pose. */
function drawChickenSprite(ctx, headDy, wingOut){
  headDy = headDy||0;
  for(let y=0;y<16;y++){
    const row = CHICKEN_ROWS[y];
    const dy = (y<=6) ? headDy : 0;
    for(let x=0;x<16;x++){
      const ch = row[x];
      if(ch==='.') continue;
      ctx.fillStyle = CHICKEN_PAL[ch];
      ctx.fillRect(x, y+dy, 1, 1);
    }
  }
  if(wingOut){
    ctx.fillStyle = '#1B1611';
    ctx.fillRect(1,7,3,3); ctx.fillRect(12,7,3,3);
    ctx.fillStyle = '#E0B876';
    ctx.fillRect(1,7,2,2); ctx.fillRect(13,7,2,2);
  }
}

/* grid helpers ------------------------------------------------------- */
function colCenterX(c){ return c*TILE + TILE/2; }
function colOf(x){ return Math.max(0, Math.min(COLS-1, Math.round(x/TILE - 0.5))); }

/* ---------------------------------------------------------------------
   1c. Particle system (DESIGN.md §5) — dust, feathers, splash, sparkle,
   expanding rings, ambient. All simple filled shapes, no images.
   --------------------------------------------------------------------- */
class Particle {
  constructor(o){
    this.x=o.x; this.y=o.y; this.vx=o.vx||0; this.vy=o.vy||0;
    this.g=o.g||0; this.size=o.size||2; this.color=o.color||'#fff';
    this.life=o.life||0.3; this.max=this.life; this.type=o.type||'rect';
    this.rot=Math.random()*Math.PI; this.vr=(Math.random()-0.5)*8;
    this.drag=o.drag||0;
  }
  update(dt){
    this.life -= dt;
    this.vy += this.g*dt;
    if(this.drag){ this.vx *= (1-this.drag*dt); this.vy *= (1-this.drag*dt); }
    this.x += this.vx*dt; this.y += this.vy*dt; this.rot += this.vr*dt;
    return this.life>0;
  }
  render(ctx){
    const a = Math.max(0, this.life/this.max);
    ctx.globalAlpha = a;
    if(this.type==='ring'){
      const r = this.size*(1 + (1-a)*2.2);
      ctx.strokeStyle = this.color; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(this.x, this.y, r, 0, Math.PI*2); ctx.stroke();
    } else if(this.type==='feather'){
      ctx.save(); ctx.translate(this.x,this.y); ctx.rotate(this.rot);
      ctx.fillStyle = this.color;
      ctx.fillRect(-this.size, -1, this.size*2, 2);
      ctx.restore();
    } else if(this.type==='spark'){
      ctx.fillStyle = this.color;
      ctx.fillRect(this.x-this.size, this.y, this.size*2, 1);
      ctx.fillRect(this.x, this.y-this.size, 1, this.size*2);
    } else {
      ctx.fillStyle = this.color;
      ctx.fillRect(this.x|0, this.y|0, this.size, this.size);
    }
    ctx.globalAlpha = 1;
  }
}
class ParticleSystem {
  constructor(){ this.list = []; }
  clear(){ this.list.length = 0; }
  add(o){ this.list.push(new Particle(o)); }
  update(dt){
    for(let i=this.list.length-1;i>=0;i--){
      if(!this.list[i].update(dt)) this.list.splice(i,1);
    }
  }
  render(ctx){ for(const p of this.list) p.render(ctx); }

  dust(x,y,tint){
    const col = tint || '#C9BFA6';
    const n = 3 + (Math.random()*3|0);
    for(let i=0;i<n;i++){
      const a = (i/n)*Math.PI*2 + Math.random();
      this.add({x,y, vx:Math.cos(a)*30, vy:Math.sin(a)*18 - 24,
        g:20, size:2+(Math.random()*2|0), color:col, life:0.25+Math.random()*0.08});
    }
  }
  feathers(x,y){
    const cols = ['#FFF3D6','#E8D5A8','#E0B876'];
    for(let i=0;i<9;i++){
      const a = (i/9)*Math.PI*2 + Math.random()*0.4;
      const sp = 60+Math.random()*80;
      this.add({x,y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp - 40,
        g:220, size:2+(Math.random()*2|0), color:cols[i%3], life:0.5+Math.random()*0.2, type:'feather'});
    }
  }
  splash(x,y,foam,water){
    for(let i=0;i<11;i++){
      const a = (i/11)*Math.PI*2;
      const sp = 50+Math.random()*70;
      this.add({x,y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp - 60,
        g:260, size:2, color:(i%2?foam:water), life:0.4+Math.random()*0.2});
    }
    this.add({x,y, size:6, color:foam, life:0.5, type:'ring'});
  }
  sparkle(x,y){
    for(let i=0;i<6;i++){
      const a = (i/6)*Math.PI*2;
      this.add({x,y, vx:Math.cos(a)*40, vy:Math.sin(a)*40,
        size:2, color:(i%2?'#FFD23F':'#FFFFFF'), life:0.28+Math.random()*0.07, type:'spark'});
    }
  }
}

/* ---------------------------------------------------------------------
   2. Audio manager — Web Audio synthesized SFX (DESIGN.md / PRD AC-11)
   --------------------------------------------------------------------- */
class AudioManager {
  constructor(){
    this.ctx = null;
    this.muted = false;
    this.unlocked = false;
    this.master = null;
  }
  ensure(){
    if(this.ctx) return;
    try {
      const AC = window.AudioContext || window.webkitAudioContext;
      this.ctx = new AC();
      this.master = this.ctx.createGain();
      this.master.gain.value = 0.5;
      this.master.connect(this.ctx.destination);
    } catch(e){ this.ctx = null; }
  }
  unlock(){
    this.ensure();
    if(this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
    this.unlocked = true;
  }
  toggleMute(){ this.muted = !this.muted; return this.muted; }
  /* generic tone with optional frequency sweep */
  tone(freq, dur, type, gain, sweepTo, delay){
    if(!this.ctx || this.muted) return;
    const t0 = this.ctx.currentTime + (delay||0);
    const osc = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    osc.type = type || 'square';
    osc.frequency.setValueAtTime(freq, t0);
    if(sweepTo) osc.frequency.exponentialRampToValueAtTime(Math.max(1,sweepTo), t0+dur);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(gain||0.3, t0+0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
    osc.connect(g); g.connect(this.master);
    osc.start(t0); osc.stop(t0+dur+0.02);
  }
  noise(dur, gain, filterFreq){
    if(!this.ctx || this.muted) return;
    const t0 = this.ctx.currentTime;
    const n = Math.floor(this.ctx.sampleRate * dur);
    const buf = this.ctx.createBuffer(1, n, this.ctx.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0;i<n;i++) d[i] = (Math.random()*2-1) * (1 - i/n);
    const src = this.ctx.createBufferSource(); src.buffer = buf;
    const g = this.ctx.createGain(); g.gain.value = gain||0.3;
    const f = this.ctx.createBiquadFilter(); f.type='lowpass'; f.frequency.value = filterFreq||1200;
    src.connect(f); f.connect(g); g.connect(this.master);
    src.start(t0);
  }
  hop(){ this.tone(420, 0.09, 'square', 0.22, 720); }
  corn(){ this.tone(880,0.08,'sine',0.28); this.tone(1320,0.10,'sine',0.24,null,0.06); }
  horn(){ this.tone(180,0.22,'sawtooth',0.16,170); }
  bell(){ this.tone(1400,0.08,'triangle',0.20); this.tone(1860,0.10,'triangle',0.14,null,0.02); }
  death(){ this.tone(600,0.18,'square',0.28,120); this.noise(0.25,0.22,900); this.tone(300,0.3,'sawtooth',0.14,90,0.05); }
  splash(){ this.noise(0.3,0.28,2200); this.tone(500,0.2,'sine',0.14,120); }
  clear(){ [523,659,784,1046].forEach((f,i)=> this.tone(f,0.16,'square',0.22,null,i*0.09)); }
  gameover(){ [392,330,262].forEach((f,i)=> this.tone(f,0.28,'square',0.2,null,i*0.14)); }
}

/* ---------------------------------------------------------------------
   3. Input manager — keyboard + touch/swipe (PRD AC-2 / AC-13)
   --------------------------------------------------------------------- */
class InputManager {
  constructor(canvas, game){
    this.game = game;
    this.canvas = canvas;
    this._bindKeys();
    this._bindTouch();
  }
  _bindKeys(){
    window.addEventListener('keydown', (e)=>{
      const k = e.key.toLowerCase();
      const arrows = ['arrowup','arrowdown','arrowleft','arrowright',' '];
      if(arrows.includes(k)) e.preventDefault();
      this.game.onFirstInput();
      if(k==='arrowup'||k==='w') this.game.input('up');
      else if(k==='arrowdown'||k==='s') this.game.input('down');
      else if(k==='arrowleft'||k==='a') this.game.input('left');
      else if(k==='arrowright'||k==='d') this.game.input('right');
      else if(k===' '||k==='enter') this.game.input('confirm');
      else if(k==='m') this.game.toggleMute();
    }, {passive:false});
  }
  _bindTouch(){
    let sx=0, sy=0, active=false, moved=false;
    const start = (x,y)=>{ sx=x; sy=y; active=true; moved=false; };
    const end = (x,y)=>{
      if(!active) return; active=false;
      const dx=x-sx, dy=y-sy;
      const adx=Math.abs(dx), ady=Math.abs(dy);
      this.game.onFirstInput();
      if(adx<24 && ady<24){ this.game.input('tap'); return; }
      if(adx>ady) this.game.input(dx>0?'right':'left');
      else this.game.input(dy>0?'down':'up');
    };
    this.canvas.addEventListener('pointerdown', (e)=>{ start(e.clientX,e.clientY); }, {passive:true});
    this.canvas.addEventListener('pointerup',   (e)=>{ end(e.clientX,e.clientY); }, {passive:true});
    this.canvas.addEventListener('pointercancel',()=>{ active=false; }, {passive:true});
    // block context menu / gestures
    this.canvas.addEventListener('contextmenu', e=>e.preventDefault());
  }
}

/* ---------------------------------------------------------------------
   4. Camera — smooth eased upward push + lookahead (DESIGN/PRD §7.2)
   (basic here; parallax + tuning expanded in later chunks)
   --------------------------------------------------------------------- */
class Camera {
  constructor(){
    this.y = -LEAD;          // row at the anchor line (float)
    this.minY = -LEAD;       // monotonically-rising auto-scroll floor
    this.look = 0;           // lookahead offset (rows)
    this.scroll = 0.35;      // rows/sec auto push (per stage)
    this.shakeX = 0; this.shakeY = 0; this._sMag = 0; this._sT = 0;
  }
  reset(scroll){
    this.y = -LEAD; this.minY = -LEAD; this.look = 0;
    this.scroll = scroll; this.shakeX=0; this.shakeY=0; this._sMag=0; this._sT=0;
  }
  shake(mag){ this._sMag = Math.max(this._sMag, mag); this._sT = 0.2; }
  update(dt, player, active){
    if(active){
      this.minY += this.scroll * dt;                 // never stops rising
      const targetLook = player.lookDir * 0.5;
      this.look += (targetLook - this.look) * Math.min(1, dt*6);
      const desired = Math.max(this.minY, player.visualRow() - LEAD) + this.look;
      this.y += (desired - this.y) * (1 - Math.exp(-dt*7));
    }
    // shake decay
    if(this._sT > 0){
      this._sT -= dt;
      const k = Math.max(0, this._sT/0.2);
      const amp = this._sMag * k;
      this.shakeX = (Math.random()*2-1)*amp;
      this.shakeY = (Math.random()*2-1)*amp;
      if(this._sT<=0){ this.shakeX=0; this.shakeY=0; this._sMag=0; }
    }
  }
  tileTop(row){ return ANCHOR - (row - this.y + 1)*TILE; }
}

/* ---------------------------------------------------------------------
   5. Player — grid hop with squash/stretch, wing flap, input buffer,
   boundary/obstacle blocking, death poses (DESIGN.md §4.1)
   --------------------------------------------------------------------- */
class Player {
  constructor(game){
    this.game = game;
    this.row = 0;
    this.x = colCenterX(3);      // center column
    this.facing = 1;
    this.lookDir = 0;            // -1/0/1 for camera lookahead
    this.hopping = false;
    this.t = 0;
    this.fromX = this.x; this.toX = this.x;
    this.fromRow = 0; this.toRow = 0;
    this.buffer = null;
    this.idlePhase = 0;
    this.ridingLog = null; this.rideOffset = 0;
    this.dead = false; this.deathKind = null; this.deathT = 0;
    this.deathX = this.x; this.deathY = 0;
  }
  visualRow(){
    if(this.hopping){
      const p = this._ease(this.t);
      return this.fromRow + (this.toRow - this.fromRow)*p;
    }
    return this.row;
  }
  _ease(t){ return t<0.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2; } // easeInOutQuad

  col(){ return colOf(this.x); }

  tryHop(dir){
    if(this.dead) return;
    if(this.hopping){
      if(this.t > 0.65) this.buffer = dir;   // input buffer (DESIGN §4.1)
      return;
    }
    this._startHop(dir);
  }
  _startHop(dir){
    let targetRow = this.row, targetX = colCenterX(this.col());
    const c = this.col();
    if(dir==='up'){ targetRow = this.row+1; this.lookDir = 0; }
    else if(dir==='down'){ if(this.row<=0){ return; } targetRow = this.row-1; this.lookDir = 0; }
    else if(dir==='left'){ if(c<=0){ return; } targetX = colCenterX(c-1); this.facing = -1; this.lookDir = -1; }
    else if(dir==='right'){ if(c>=COLS-1){ return; } targetX = colCenterX(c+1); this.facing = 1; this.lookDir = 1; }
    else return;

    // obstacle blocking on target grass tile
    const lane = this.game.laneAt(targetRow);
    const targetCol = colOf(targetX);
    if(lane && lane.blocks(targetCol)){
      this.game.audio.tone(140,0.05,'square',0.12); // soft bump
      return;
    }
    // begin hop
    this.hopping = true; this.t = 0;
    this.fromX = this.x; this.toX = targetX;
    this.fromRow = this.row; this.toRow = targetRow;
    this.ridingLog = null;
    this.game.audio.hop();
    // dust at origin
    const oy = this.game.camera.tileTop(this.row) + TILE - 4;
    this.game.particles.dust(this.x, oy, this.game.dustTint());
  }
  _land(){
    this.row = this.toRow; this.x = this.toX;
    this.hopping = false; this.t = 0; this.lookDir = 0;
    const dy = this.game.camera.tileTop(this.row) + TILE - 4;
    this.game.particles.dust(this.x, dy, this.game.dustTint());
    this.game.onPlayerLanded();
    if(this.buffer){ const b=this.buffer; this.buffer=null; this._startHop(b); }
  }
  update(dt){
    if(this.dead){ this.deathT += dt; return; }
    if(this.hopping){
      this.t += dt/HOP_DUR;
      if(this.t>=1){ this.t=1; this._land(); }
      else { const p=this._ease(this.t); this.x = this.fromX + (this.toX-this.fromX)*p; }
    } else {
      this.idlePhase += dt;
      // riding a log carries the chicken
      if(this.ridingLog){
        this.x = this.ridingLog.x + this.rideOffset;
        if(this.x < 6 || this.x > WORLD_W-6){ this.game.killPlayer('river-edge'); }
      }
    }
  }
  die(kind){
    if(this.dead) return;
    this.dead = true; this.deathKind = kind; this.deathT = 0;
    this.deathX = this.x;
    this.deathY = this.game.camera.tileTop(this.row) + TILE/2;
  }
  render(ctx, cam){
    if(this.dead && this.deathKind==='water'){
      // sinking shrink over 150ms then gone
      const k = Math.max(0, 1 - this.deathT/0.15);
      if(k<=0) return;
      this._drawBody(ctx, cam, 1, k, 0, 0, false);
      return;
    }
    if(this.dead && (this.deathKind==='car'||this.deathKind==='train')){
      if(this.deathT < 0.08){ this._drawBody(ctx, cam, 1.4, 0.4, 0, 0, false); }
      return; // then hidden; feathers carry the beat
    }
    if(this.dead) return; // eagle handled elsewhere

    // alive: idle or hop
    let sx=1, sy=1, lift=0, wing=false, headDy=0;
    if(this.hopping){
      const p = this.t;
      if(p<0.2){ sy=0.85; sx=1.15; wing=true; }
      else if(p<0.8){ sy=1.15; sx=0.9; wing=true; }
      else { sy=0.8; sx=1.2; }
      lift = Math.sin(Math.PI*this._ease(p)) * HOP_LIFT;
    } else {
      const f = Math.floor((this.idlePhase*1000/180)) % 4; // 4 frames @180ms
      headDy = [0,1,2,1][f];
      if(this.ridingLog) lift = -1; // slight dip aboard log
    }
    this._drawBody(ctx, cam, sx, sy, lift, headDy, wing);
  }
  _drawBody(ctx, cam, sx, sy, lift, headDy, wing){
    const vr = this.visualRow();
    const feetY = cam.tileTop(vr) + TILE - 4 - lift;
    const SCALE = 3;
    // shadow
    ctx.globalAlpha = 0.22; ctx.fillStyle = '#000';
    ctx.fillRect(this.x-15, feetY-2, 30, 6); ctx.globalAlpha = 1;
    ctx.save();
    ctx.translate(this.x, feetY);
    ctx.scale(SCALE*sx*this.facing, SCALE*sy);
    ctx.translate(-8, -16);
    drawChickenSprite(ctx, headDy, wing);
    ctx.restore();
  }
}

/* =====================================================================
   MAIN GAME  (chunk 1 scaffold — expanded in later chunks)
   ===================================================================== */
class Game {
  constructor(canvas){
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.audio = new AudioManager();
    this.state = S.TITLE;
    this.time = 0;
    this.scale = 1;
    this.highScore = 0;
    this.camera = new Camera();
    this.particles = new ParticleSystem();
    this.player = null;
    this.lanes = [];
    this.stage = 0;
    this.stageBase = 0;
    this.furthest = 0;
    this.corn = 0;
    this.titleChicken = { idlePhase: 0 };
    this._resize();
    window.addEventListener('resize', ()=>this._resize());
    window.addEventListener('orientationchange', ()=>this._resize());
    this.input_ = new InputManager(canvas, this);
    this._last = performance.now();
    requestAnimationFrame((t)=>this._loop(t));
  }

  /* scale-to-fit + letterbox + devicePixelRatio crisp (PRD §4) */
  _resize(){
    const dpr = Math.max(1, Math.min(3, window.devicePixelRatio||1));
    const availW = window.innerWidth, availH = window.innerHeight;
    let scale = Math.min(availW/VW, availH/VH);
    scale = Math.max(0.1, scale);
    this.scale = scale;
    this.canvas.style.width  = Math.round(VW*scale) + 'px';
    this.canvas.style.height = Math.round(VH*scale) + 'px';
    this.canvas.width  = Math.round(VW*scale*dpr);
    this.canvas.height = Math.round(VH*scale*dpr);
    this._renderScale = scale*dpr;
    this.ctx.imageSmoothingEnabled = false;
  }

  onFirstInput(){ this.audio.unlock(); }
  toggleMute(){ const m=this.audio.toggleMute(); return m; }

  /* central input router (expanded per state in later chunks) */
  input(dir){
    if(this.state===S.TITLE){
      if(dir==='confirm'||dir==='tap'||dir==='up') this.startRun();
      return;
    }
    if(this.state===S.GAME_OVER || this.state===S.VICTORY){
      if(dir==='confirm'||dir==='tap'||dir==='up') this.startRun();
      return;
    }
    if(this.state===S.PLAYING){
      // movement handled in chunk 2 (Player)
      if(this.player && (dir==='up'||dir==='down'||dir==='left'||dir==='right'))
        this.player.tryHop(dir);
      else if(this.player && dir==='tap')
        this.player.tryHop('up');
    }
  }

  /* ---- run lifecycle (lane generation temporary; real gen in chunk 3) ---- */
  startRun(){
    this.stage = 0; this.stageBase = 0; this.corn = 0;
    this._startStage();
    this.state = S.PLAYING;
  }
  _startStage(){
    this.furthest = 0;
    this.camera.reset(0.35);
    this.particles.clear();
    this.player = new Player(this);
    this._genLanes();
  }
  _genLanes(){
    // TEMP: flat grass field (real lane generation arrives in chunk 3)
    this.lanes = [];
    for(let r=0;r<=STAGE_ROWS+4;r++){
      this.lanes.push({ type:'grass', row:r, blocks:()=>false });
    }
  }
  laneAt(row){ return this.lanes[row] || null; }
  dustTint(){
    const l = this.player && this.laneAt(this.player.row);
    return (l && l.type==='road') ? '#8A8A94' : '#C9BFA6';
  }
  onPlayerLanded(){
    const p = this.player;
    if(p.row > this.furthest){ this.furthest = p.row; }
    this.score = this.stageBase + this.furthest + this.corn*3;
    if(p.row >= STAGE_ROWS){ /* stage clear — wired in chunk 6 */ }
  }
  killPlayer(cause){
    if(!this.player || this.player.dead) return;
    this.player.die(cause==='water'||cause==='river-edge' ? 'water' : cause);
    // full death flow (shake/slow-mo/particles/state) arrives in chunk 5
    this.state = S.DYING;
  }
  get score(){ return this._score||0; }
  set score(v){ this._score = v; }

  _loop(now){
    let dt = (now - this._last)/1000;
    this._last = now;
    if(dt>0.05) dt = 0.05;          // clamp (tab switch / hitches)
    this.time += dt;
    this.update(dt);
    this.render();
    requestAnimationFrame((t)=>this._loop(t));
  }

  update(dt){
    if(this.state===S.TITLE){
      this.titleChicken.idlePhase += dt;
    } else if(this.state===S.PLAYING){
      this.player.update(dt);
      this.camera.update(dt, this.player, true);
      this.particles.update(dt);
    } else if(this.state===S.DYING){
      this.player.update(dt);
      this.camera.update(dt, this.player, false);
      this.particles.update(dt);
    }
  }

  render(){
    const ctx = this.ctx;
    ctx.setTransform(this._renderScale,0,0,this._renderScale,0,0);
    ctx.imageSmoothingEnabled = false;
    ctx.fillStyle = '#0B0E1A';
    ctx.fillRect(0,0,VW,VH);

    if(this.state===S.TITLE){
      this._renderTitlePlaceholder(ctx);
    } else {
      this._renderWorld(ctx);
      this._renderHUD(ctx);
    }
  }

  /* ---- world (temporary grass field; real lanes/parallax in chunk 3) ---- */
  _renderWorld(ctx){
    const cam = this.camera;
    ctx.save();
    ctx.translate(cam.shakeX, cam.shakeY);
    // sky backdrop
    const g = ctx.createLinearGradient(0,0,0,VH);
    g.addColorStop(0,'#8FD3F4'); g.addColorStop(1,'#C9F2C0');
    ctx.fillStyle = g; ctx.fillRect(0,-40,VW,VH+80);
    // lanes
    const r0 = Math.floor(cam.y) - 2;
    const r1 = Math.ceil(cam.y) + Math.ceil(VH/TILE) + 2;
    for(let r=r1;r>=r0;r--){
      const top = cam.tileTop(r);
      if(top>VH || top+TILE<0) continue;
      ctx.fillStyle = (r%2===0) ? '#6ABE30' : '#4F9A28';
      ctx.fillRect(0, top, VW, TILE);
      ctx.fillStyle = '#3E7A1F';
      for(let i=0;i<5;i++){
        const bx = ((r*53+i*97)%VW);
        ctx.fillRect(bx, top+8+((i*11)%30), 2, 3);
      }
    }
    if(this.player) this.player.render(ctx, cam);
    this.particles.render(ctx);
    ctx.restore();
  }

  _renderHUD(ctx){
    ctx.fillStyle = 'rgba(15,23,42,0.82)';
    ctx.fillRect(0,0,VW,HUD_H);
    ctx.fillStyle = 'rgba(255,255,255,0.10)';
    ctx.fillRect(0,HUD_H-1,VW,1);
    drawText(ctx,'SCORE',12,8,1,'#94A3B8','left',1);
    drawText(ctx,String(this.score),12,20,2,'#FFFFFF','left',1);
    drawText(ctx,'STAGE '+(this.stage+1)+'/3',VW/2,16,1,'#FFFFFF','center',1);
    drawText(ctx,String(this.corn),VW-52,20,2,'#FFD23F','right',1);
    drawText(ctx, this.audio.muted?'X':'O', VW-22, 14, 2, '#2563EB','center',1);
  }

  _renderTitlePlaceholder(ctx){
    const g = ctx.createLinearGradient(0,0,0,VH);
    g.addColorStop(0,'#8FD3F4'); g.addColorStop(1,'#C9F2C0');
    ctx.fillStyle = g; ctx.fillRect(0,0,VW,VH);
    drawText(ctx, 'CHICKEN ROAD', VW/2, 90, 3, '#FFFFFF', 'center', 2);
    // idle-animated hero chicken (4x)
    const f = Math.floor((this.titleChicken.idlePhase*1000/180)) % 4;
    const headDy = [0,1,2,1][f];
    ctx.save();
    ctx.translate(VW/2, 300);
    ctx.scale(4,4); ctx.translate(-8,-16);
    drawChickenSprite(ctx, headDy, false);
    ctx.restore();
    const blink = (Math.floor(this.time*2)%2)===0;
    if(blink){
      drawText(ctx, 'PRESS SPACE TO START', VW/2, 380, 1, '#FFFFFF', 'center', 2);
      drawText(ctx, 'TAP TO START', VW/2, 400, 1, '#FFFFFF', 'center', 2);
    }
    if(this.highScore>0) drawText(ctx,'BEST: '+this.highScore, VW/2, 424, 1, '#FFD23F','center',2);
  }
}

/* ---------------------------------------------------------------------
   Boot
   --------------------------------------------------------------------- */
window.addEventListener('load', ()=>{
  const canvas = document.getElementById('game');
  window.__game = new Game(canvas);
});
</script>
</body>
